# Included by smartstock-location.conf from inside each matching location.
auth_basic "QuantPilot";
auth_basic_user_file /etc/nginx/.quantpilot-htpasswd;

client_max_body_size 50m;
proxy_http_version 1.1;

# No trailing slash: preserve /smartstock because Next.js was built with this basePath.
proxy_pass http://127.0.0.1:3000;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Prefix /smartstock;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $quantpilot_connection_upgrade;

proxy_buffering off;
proxy_cache off;
proxy_read_timeout 3600s;
proxy_send_timeout 3600s;
