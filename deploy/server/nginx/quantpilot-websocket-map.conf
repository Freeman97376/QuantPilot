# Install under /etc/nginx/conf.d/. The conf.d directory is loaded in nginx's http block.
map $http_upgrade $quantpilot_connection_upgrade {
    default upgrade;
    ''      close;
}

# Only the configured 4100-4999 preview pool can be reached through Nginx.
map $uri $quantpilot_preview_port {
    default "";
    ~^/smartstock/previews/(4[1-9][0-9][0-9])(?:/|$) $1;
}
