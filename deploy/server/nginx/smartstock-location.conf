# Include this file inside the existing mantleofintelligence.com server block.
location ^~ /smartstock/previews/ {
    auth_basic "QuantPilot";
    auth_basic_user_file /etc/nginx/.quantpilot-htpasswd;

    if ($quantpilot_preview_port = "") {
        return 404;
    }

    proxy_http_version 1.1;
    proxy_pass http://127.0.0.1:$quantpilot_preview_port;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $quantpilot_connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 3600s;
}

location = /smartstock {
    include /etc/nginx/snippets/quantpilot-smartstock-proxy.conf;
}

location ^~ /smartstock/ {
    include /etc/nginx/snippets/quantpilot-smartstock-proxy.conf;
}
